<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Abstract Overlay</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
    }
    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: transparent;
    }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: true });

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let t = 0;

function neon() {
    const colors = ["#00ffff","#ff00ff","#ff0099","#9900ff","#00ff99","#ff6600","#0066ff"];
    return colors[Math.floor(Math.random() * colors.length)];
}

//
// PARTICULE NEON (ușoare pentru CPU)
//
let particles = [];
for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2 + 1,
        a: Math.random() * Math.PI * 2
    });
}

function drawParticles() {
    for (let p of particles) {
        p.x += Math.cos(p.a) * p.s;
        p.y += Math.sin(p.a) * p.s;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.fillStyle = neon();
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

//
// TUNEL 3D (cercuri animate, optimizate)
//
function drawTunnel() {
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    for (let i = 0; i < 12; i++) {
        ctx.strokeStyle = neon();
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.4;

        let r = Math.abs(i * 60 + (t * 2 % 200));

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
    }
}

//
// FASCICULE LASER (puține, fluide)
//
function drawLasers() {
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    for (let i = 0; i < 8; i++) {
        let angle = i * 0.8 + t * 0.01;
        let len = canvas.width * 1.5;

        let x2 = cx + Math.cos(angle) * len;
        let y2 = cy + Math.sin(angle) * len;

        ctx.strokeStyle = neon();
        ctx.lineWidth = 4;
        ctx.globalAlpha = 0.5;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }
}

//
// FORME ABSTRACTE (ușoare, organice)
//
function drawShapes() {
    for (let i = 0; i < 6; i++) {
        let cx = (i * 200 + t * 1.5) % canvas.width;
        let cy = (i * 150 + t * 1.2) % canvas.height;

        let size = 40 + Math.sin(t * 0.02 + i) * 20;

        ctx.strokeStyle = neon();
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.6;

        ctx.beginPath();
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
            let x = cx + Math.cos(a + t * 0.01) * size;
            let y = cy + Math.sin(a + t * 0.01) * size;
            ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
    }
}

//
// LOOP PRINCIPAL
//
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawTunnel();
    drawParticles();
    drawLasers();
    drawShapes();

    t++;
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
